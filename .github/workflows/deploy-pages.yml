name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract frontend source
        run: |
          mkdir app
          tar -xzf frontend-source.tgz -C app
          echo "APP_DIR=app" >> "$GITHUB_ENV"

      - name: Apply source overlays
        run: |
          if [ -d src ]; then
            cp -R src/. app/src/
          fi
          if [ -f app/src/pages/AdminPage.tsx.part.001 ]; then
            cat app/src/pages/AdminPage.tsx.part.* > app/src/pages/AdminPage.tsx
            rm app/src/pages/AdminPage.tsx.part.*
          fi
          if [ -d public ]; then
            mkdir -p app/public
            cp -R public/. app/public/
          fi
          if [ -f app/public/invoice_template_20260605.xlsx.b64.part.001 ]; then
            cat app/public/invoice_template_20260605.xlsx.b64.part.* | base64 -d > app/public/invoice_template_20260605.xlsx
            rm app/public/invoice_template_20260605.xlsx.b64.part.*
          elif [ -f app/public/invoice_template_20260605.xlsx.b64.001 ]; then
            cat app/public/invoice_template_20260605.xlsx.b64.* | base64 -d > app/public/invoice_template_20260605.xlsx
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package.json

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Build
        working-directory: app
        env:
          VITE_FIREBASE_API_KEY: AIzaSyBDz6mvfJYlZ-zww-V4yW5uHD_O63rbdGk
          VITE_FIREBASE_AUTH_DOMAIN: viv-consumables.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: viv-consumables
          VITE_FIREBASE_STORAGE_BUCKET: viv-consumables.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '914905268403'
          VITE_FIREBASE_APP_ID: 1:914905268403:web:f3b1e555e59a48cab7b0c6
          VITE_FIREBASE_MEASUREMENT_ID: G-RN0ND1YTV4
          VITE_BASE_PATH: /consumables/
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
