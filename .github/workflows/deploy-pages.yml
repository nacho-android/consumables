name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare frontend source
        run: |
          if [ -f package.json ]; then
            echo "APP_DIR=." >> "$GITHUB_ENV"
          else
            mkdir app
            tar -xzf frontend-source.tgz -C app
            echo "APP_DIR=app" >> "$GITHUB_ENV"
          fi

      - name: Restore invoice template
        run: |
          if [ -f "$APP_DIR/public/invoice_template_20260605.xlsx.b64.001" ]; then
            cat "$APP_DIR"/public/invoice_template_20260605.xlsx.b64.* | base64 -d > "$APP_DIR/public/invoice_template_20260605.xlsx"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package.json

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm install

      - name: Build
        working-directory: ${{ env.APP_DIR }}
        env:
          VITE_FIREBASE_API_KEY: AIzaSyBDz6mvfJYlZ-zww-V4yW5uHD_O63rbdGk
          VITE_FIREBASE_AUTH_DOMAIN: viv-consumables.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: viv-consumables
          VITE_FIREBASE_STORAGE_BUCKET: viv-consumables.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '914905268403'
          VITE_FIREBASE_APP_ID: 1:914905268403:web:f3b1e555e59a48cab7b0c6
          VITE_FIREBASE_MEASUREMENT_ID: G-RN0ND1YTV4
          VITE_BASE_PATH: /consumables/
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.APP_DIR }}/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
